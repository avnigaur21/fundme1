<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundMe | Role Selection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .fade-transition {
            transition: opacity 0.3s ease-in-out;
            opacity: 1;
        }

        .fade-out {
            opacity: 0;
        }
    </style>
</head>

<body>

    <div class="onboarding-container">
        <!-- Left Panel: Value Prop -->
        <div class="onboarding-left">
            <div style="z-index: 1;">
                <a href="index.html"
                    style="color: white; font-weight: 700; font-size: 1.5rem; display: block; margin-bottom: 4rem;">FundMe.</a>
                <h1 id="onboardingHeadline" class="fade-transition"
                    style="color: white; font-size: 2.5rem; margin-bottom: 1.5rem;">Clarity
                    Before Capital.<br>
                    Confidence Before You Apply.</h1>
                <p id="onboardingSubtext" class="fade-transition"
                    style="color: #9CA3AF; font-size: 1.125rem; max-width: 480px; line-height: 1.6;">Built for students
                    and early-stage founders exploring grants, incubation programs, and early funding opportunities.</p>
            </div>
        </div>

        <!-- Right Panel: Form -->
        <div class="onboarding-right">
            <div class="auth-box">
                <h2 style="margin-bottom: 0.5rem; font-size: 1.5rem;">Welcome to FundMe</h2>
                <p style="color: var(--color-text-secondary); margin-bottom: 2rem;">Select your primary role to
                    customize your specialized dashboard.</p>

                <form action="dashboard.html" onsubmit="return handleSignup(event)">
                    <!-- Role Selection -->
                    <div class="form-group">
                        <label class="form-label">I am a...</label>
                        <div class="role-grid">
                            <div class="role-tile">
                                <input type="radio" name="role" id="role_founder" value="founder" checked>
                                <label class="role-label" for="role_founder">
                                    Founder
                                </label>
                            </div>
                            <div class="role-tile">
                                <input type="radio" name="role" id="role_investor" value="investor">
                                <label class="role-label" for="role_investor">
                                    Investor
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Startup Data Capture (Visible for Founder) -->
                    <div id="founderFields" class="fade-transition">
                        <div class="grid grid-cols-2" style="gap: var(--spacing-md); margin-bottom: var(--spacing-md);">
                            <div class="form-group">
                                <label class="form-label">Sector</label>
                                <select class="form-select">
                                    <option>AI / Deep Tech</option>
                                    <option>Fintech</option>
                                    <option>HealthTech</option>
                                    <option>Climate</option>
                                    <option>EdTech</option>
                                    <option>B2B SaaS</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Startup Stage</label>
                                <select class="form-select">
                                    <option>Idea</option>
                                    <option>Prototype</option>
                                    <option>MVP</option>
                                    <option>Early Revenue</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Investor Data Capture (Visible for Investor) -->
                    <div id="investorFields" class="fade-transition" style="display: none;">
                        <div class="grid grid-cols-3" style="gap: var(--spacing-sm); margin-bottom: var(--spacing-md);">
                            <div class="form-group">
                                <label class="form-label" style="white-space: nowrap;">Investor</label>
                                <select class="form-select" style="padding-left: 0.5rem; padding-right: 0.5rem;">
                                    <option>Angel</option>
                                    <option>VC/Fund</option>
                                    <option>Incubator</option>
                                    <option>Campus</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Firm</label>
                                <input type="text" class="form-input" placeholder="e.g. Acme">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Focus</label>
                                <select class="form-select" style="padding-left: 0.5rem; padding-right: 0.5rem;">
                                    <option>DeepTech</option>
                                    <option>Climate</option>
                                    <option>FinTech</option>
                                    <option>HealthTech</option>
                                    <option>Generalist</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" placeholder="name@gmail.com">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create
                        Account</button>

                    <p
                        style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--color-text-secondary);">
                        Already have an account? <a href="#" style="font-weight: 500;">Log in</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const founderFields = document.getElementById('founderFields');
            const investorFields = document.getElementById('investorFields');
            const roleRadios = document.querySelectorAll('input[name="role"]');
            const headline = document.getElementById('onboardingHeadline');
            const subtext = document.getElementById('onboardingSubtext');

            roleRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    // Start fade out
                    headline.classList.add('fade-out');
                    subtext.classList.add('fade-out');
                    founderFields.classList.add('fade-out');
                    investorFields.classList.add('fade-out');

                    setTimeout(() => {
                        if (e.target.value === 'founder') {
                            founderFields.style.display = 'block';
                            investorFields.style.display = 'none';
                            headline.innerHTML = 'Clarity Before Capital.<br>\n                    Confidence Before You Apply.';
                            subtext.innerText = 'Built for students and early-stage founders exploring grants, incubation programs, and early funding opportunities.';
                        } else if (e.target.value === 'investor') {
                            founderFields.style.display = 'none';
                            investorFields.style.display = 'block';
                            headline.innerHTML = 'Navigate The Ecosystem.<br>\n                    Find Ways To Participate.';
                            subtext.innerText = 'Built for investors, incubators, and funds tracking government schemes, fund calls, and ecosystem participation opportunities.';
                        }

                        // Small extra delay to ensure display:block has rendered before fading in
                        requestAnimationFrame(() => {
                            headline.classList.remove('fade-out');
                            subtext.classList.remove('fade-out');
                            founderFields.classList.remove('fade-out');
                            investorFields.classList.remove('fade-out');
                        });

                    }, 300); // Wait for CSS transition (0.3s)
                });
            });
        });

        function handleSignup(event) {
            event.preventDefault(); // Prevent form submission

            // Get selected role
            const selectedRole = document.querySelector('input[name="role"]:checked');

            // Validation
            if (!selectedRole) {
                alert("Please select a role before continuing.");
                return false;
            }

            // Redirect based on role
            if (selectedRole.value === "investor") {
                window.location.href = "investor-onboarding-next-steps.html";
            } else {
                window.location.href = "onboarding-next-steps.html";
            }
        }

    </script>



</body>

</html>
